<script type="module">
    // Импортируем нужные функции
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    
    setTimeout(() => {
        if (!window.db) {
            console.error('Firebase не инициализирован');
            return;
        }
        
        const auth = getAuth();
        const db = getFirestore();
        
        // Проверка авторизации
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline';
                loadAdminProducts();
                loadOrders();
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('adminSection').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        });
        
        // Вход
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                console.log('Вход выполнен успешно!');
            } catch (error) {
                console.error('Ошибка входа:', error);
                alert('Ошибка входа: ' + error.message);
            }
        });
        
        // Выход
        document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
        });
        
        // Добавление товара
        document.getElementById('addProductForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const product = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: Number(document.getElementById('productPrice').value),
                description: document.getElementById('productDescription').value,
                image: document.getElementById('productImage').value || 'https://via.placeholder.com/300x200?text=Нет+фото',
                createdAt: new Date().toISOString()
            };
            
            try {
                await addDoc(collection(db, 'products'), product);
                alert('Товар добавлен!');
                document.getElementById('addProductForm').reset();
                loadAdminProducts();
            } catch (error) {
                console.error('Ошибка добавления:', error);
                alert('Ошибка: ' + error.message);
            }
        });
        
        // Загрузка товаров в админке
        async function loadAdminProducts() {
            const container = document.getElementById('adminProductsList');
            
            try {
                const snapshot = await getDocs(collection(db, 'products'));
                const products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                
                if (products.length === 0) {
                    container.innerHTML = '<p>Нет товаров</p>';
                    return;
                }
                
                container.innerHTML = products.map(p => `
                    <div class="admin-product-item">
                        <div>
                            <strong>${p.name}</strong> - ${p.category} - ${p.price} руб.
                        </div>
                        <div>
                            <button onclick="deleteProduct('${p.id}')">Удалить</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                container.innerHTML = '<p>Ошибка загрузки</p>';
            }
        }
        
        // Удаление товара
        window.deleteProduct = async function(productId) {
            if (!confirm('Удалить товар?')) return;
            
            try {
                await deleteDoc(doc(db, 'products', productId));
                alert('Товар удален');
                loadAdminProducts();
            } catch (error) {
                console.error('Ошибка удаления:', error);
                alert('Ошибка удаления');
            }
        };
        
        // Загрузка заказов
        async function loadOrders() {
            const container = document.getElementById('ordersList');
            
            try {
                const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);
                const orders = [];
                snapshot.forEach(doc => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
                
                if (orders.length === 0) {
                    container.innerHTML = '<p>Заказов пока нет</p>';
                    return;
                }
                
                container.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <strong>Заказ от ${new Date(order.createdAt).toLocaleString()}</strong>
                            <span class="status">${order.status}</span>
                        </div>
                        <p><strong>Клиент:</strong> ${order.customerName}</p>
                        <p><strong>Телефон:</strong> ${order.customerPhone}</p>
                        <p><strong>Email:</strong> ${order.customerEmail || 'Не указан'}</p>
                        <p><strong>Сумма:</strong> ${order.total} руб.</p>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div>${item.name} × ${item.quantity} = ${item.price * item.quantity} руб.</div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
                container.innerHTML = '<p>Ошибка загрузки заказов</p>';
            }
        }
        
    }, 1000);
</script>
