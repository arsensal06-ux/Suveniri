<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>КубаньСувенир · производство сувениров с 2004</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #f9fafb;
      --bg-card: #ffffff;
      --green-soft: #059669;
      --green-light: #10b981;
      --green-pale: #d1fae5;
      --green-dark: #065f46;
      --violet: #7c3aed;
      --violet-light: #a78bfa;
      --text: #1f2937;
      --text-soft: #4b5563;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-hover: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      background: var(--bg);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1551524559-8af4e21e2a2e?w=1920&h=1080&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.05;
      z-index: -1;
    }
    .container { max-width: 1240px; margin: 0 auto; padding: 0 1.5rem; }
    .header {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      padding: 1rem 0; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); z-index: 50;
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .logo i { color: var(--green-soft); font-size: 1.8rem; }
    .logo span { color: var(--violet); }
    .header-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { color: var(--text-soft); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: 0.2s; }
    .nav-links a:hover { color: var(--green-soft); }
    .user-btn {
      background: var(--green-pale); border: 1px solid var(--green-light);
      padding: 0.4rem 1rem; border-radius: 8px; font-weight: 500; cursor: pointer;
      color: var(--green-dark); transition: 0.2s; white-space: nowrap; font-size: 0.9rem;
    }
    .user-btn:hover { background: var(--green-soft); color: white; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border);
      padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 500; cursor: pointer;
      color: var(--text-soft); transition: 0.2s; font-size: 0.85rem; display: none;
    }
    .logout-btn.visible { display: inline-block; }
    .logout-btn:hover { background: #fee2e2; border-color: #f87171; color: #b91c1c; }
    .cart-icon-wrapper { position: relative; cursor: pointer; font-size: 1.5rem; color: var(--text); }
    .cart-icon-wrapper:hover { color: var(--green-soft); }
    #cart-count {
      position: absolute; top: -8px; right: -12px; background: var(--violet);
      color: white; font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 40px;
    }
    .section { padding: 3rem 0; }
    .section-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.8rem; }
    .section-title i { color: var(--green-soft); }
    .section-subtitle { color: var(--text-light); margin-bottom: 2rem; }

    /* Новый стиль блока "О компании" */
    .about-block {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: center;
      background: white; border-radius: 16px; padding: 2rem; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .about-image-container {
      width: 100%; height: 280px; border-radius: 12px; overflow: hidden;
      background: #f0fdf4; display: flex; align-items: center; justify-content: center;
    }
    .about-image-container img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .about-text h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .about-text .highlight { color: var(--green-soft); }
    .about-text p { color: var(--text-soft); margin-bottom: 1rem; font-size: 1rem; }
    .stats { display: flex; gap: 2rem; margin-top: 1.5rem; }
    .stat-number { font-size: 2rem; font-weight: 700; color: var(--green-soft); }
    .stat-label { font-size: 0.9rem; color: var(--text-light); }

    .category-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .filter-btn {
      background: white; border: 1px solid var(--border);
      padding: 0.5rem 1.2rem; border-radius: 8px; font-weight: 500; cursor: pointer; color: var(--text-soft);
      transition: 0.2s; font-size: 0.9rem;
    }
    .filter-btn.active { background: var(--green-soft); border-color: var(--green-soft); color: white; }
    .filter-btn:hover { border-color: var(--green-soft); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
    .product-card {
      background: white; border-radius: 12px; padding: 1rem; border: 1px solid var(--border);
      box-shadow: var(--shadow); transition: 0.2s; display: flex; flex-direction: column;
    }
    .product-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .product-img {
      width: 100%; aspect-ratio: 1/1; background: #f9fafb; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 0.8rem;
      font-size: 4rem; overflow: hidden;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-title { font-weight: 600; margin-bottom: 0.2rem; font-size: 0.95rem; }
    .product-meta { font-size: 0.8rem; color: var(--text-light); margin-bottom: 0.8rem; }
    .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .price { font-weight: 700; font-size: 1.1rem; color: var(--green-dark); }
    .price-opt { font-size: 0.75rem; color: var(--text-light); display: block; }
    .add-to-cart {
      background: var(--green-pale); border: 1px solid var(--green-light);
      padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 500; cursor: pointer; color: var(--green-dark);
      font-size: 0.85rem; transition: 0.2s;
    }
    .add-to-cart:hover { background: var(--green-soft); color: white; }
    .contacts-card {
      background: white; border-radius: 12px; padding: 2rem; display: flex; flex-wrap: wrap;
      gap: 2rem; justify-content: center; margin-top: 1rem; border: 1px solid var(--border);
    }
    .contact-item { display: flex; align-items: center; gap: 0.8rem; }
    .contact-item i { font-size: 1.2rem; color: var(--green-soft); }
    .footer { text-align: center; padding: 2rem 0; color: var(--text-light); border-top: 1px solid var(--border); margin-top: 2rem; }

    /* Панели */
    .panel {
      position: fixed; top: 0; right: -100%; width: 100%; max-width: 440px; height: 100vh;
      background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.1); z-index: 1000;
      transition: right 0.3s ease; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column;
    }
    .panel.open { right: 0; }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(3px);
      z-index: 999; display: none;
    }
    .overlay.show { display: block; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-weight: 600; }
    .close-panel { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    .tabs { display: flex; gap: 0.3rem; margin-bottom: 1.5rem; }
    .tab-btn {
      flex: 1; padding: 0.5rem; border: 1px solid var(--border);
      background: transparent; border-radius: 8px; cursor: pointer; font-weight: 500;
    }
    .tab-btn.active { background: var(--green-soft); color: white; border-color: var(--green-soft); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.3rem; }
    .form-group input, .form-group select {
      width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit;
    }
    .submit-btn {
      width: 100%; padding: 0.7rem; background: var(--green-soft); color: white;
      border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 0.5rem;
    }
    .cart-item { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
    .remove-item { background: none; border: none; cursor: pointer; color: #9ca3af; }
    .total { display: flex; justify-content: space-between; font-weight: 600; margin: 1rem 0; }

    /* Страница владельца */
    .owner-page { display: none; padding: 2rem 0; }
    .owner-page.active { display: block; }
    .owner-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .back-btn { background: var(--border); border: none; padding: 0.5rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 500; }
    .owner-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    .owner-tab-btn {
      padding: 0.5rem 1.2rem; border: 1px solid var(--border); border-radius: 8px;
      background: white; cursor: pointer; font-weight: 500;
    }
    .owner-tab-btn.active { background: var(--green-soft); color: white; border-color: var(--green-soft); }
    .owner-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .owner-card {
      background: white; border-radius: 12px; padding: 1rem; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .owner-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 0.5rem; }
    .photo-upload { margin: 0.5rem 0; }
    .photo-upload input { font-size: 0.8rem; }
    .client-table { width: 100%; background: white; border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow); }
    .client-row { display: grid; grid-template-columns: 2fr 2fr 1fr; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
    .delete-btn { background: #fee2e2; border: 1px solid #f87171; padding: 0.3rem 0.8rem; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
<div id="main-site">
  <div class="container">
    <header class="header">
      <a href="#" class="logo"><i class="fas fa-tree"></i> Кубань<span>Сувенир</span></a>
      <div class="header-right">
        <ul class="nav-links">
          <li><a href="#catalog">Каталог</a></li>
          <li><a href="#about">О компании</a></li>
          <li><a href="#contacts">Контакты</a></li>
        </ul>
        <button class="user-btn" id="user-menu-btn"><i class="fas fa-user"></i> <span id="user-display">Войти</span></button>
        <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        <div class="cart-icon-wrapper" id="cart-toggle">
          <i class="fas fa-shopping-bag"></i>
          <span id="cart-count">0</span>
        </div>
      </div>
    </header>

    <section class="section" id="about">
      <div class="section-title"><i class="fas fa-info-circle"></i> О компании</div>
      <div class="about-block">
        <div class="about-text" id="about-text-container">
          <h2><span id="about-title">Сувениры с душой <span class="highlight">с 2004 года</span></span></h2>
          <p id="about-desc"><strong>КубаньСувенир</strong> — производство в Краснодарском крае.</p>
          <div class="stats"><div><span class="stat-number">20+</span><span class="stat-label">лет</span></div></div>
        </div>
        <div class="about-image-container" id="about-image-container">
          <span id="about-emoji" style="font-size:5rem;">🏔️</span>
          <img id="about-photo" src="" alt="О компании" style="display:none;">
        </div>
      </div>
    </section>

    <section class="section" id="catalog">
      <div class="section-title"><i class="fas fa-box-open"></i> Каталог</div>
      <div class="category-filter">
        <button class="filter-btn active" data-category="all">Все</button>
        <button class="filter-btn" data-category="ashtray">Пепельницы</button>
        <button class="filter-btn" data-category="plate">Тарелки</button>
        <button class="filter-btn" data-category="magnet">Магниты</button>
      </div>
      <div class="products-grid" id="products-container"></div>
    </section>

    <section class="section" id="contacts">
      <div class="section-title"><i class="fas fa-phone-alt"></i> Контакты</div>
      <div class="contacts-card">
        <div class="contact-item"><i class="fas fa-envelope"></i><a href="mailto:arsensal06@gmail.com">arsensal06@gmail.com</a></div>
        <div class="contact-item"><i class="fas fa-phone"></i><a href="tel:+79667494488">+7 (966) 749-44-88</a></div>
      </div>
    </section>
    <div class="footer">© КубаньСувенир</div>
  </div>
</div>

<div id="owner-page" class="owner-page">
  <div class="container">
    <div class="owner-header">
      <h2><i class="fas fa-crown"></i> Панель управления</h2>
      <button class="back-btn" id="back-to-site"><i class="fas fa-arrow-left"></i> Вернуться на сайт</button>
    </div>
    <div class="owner-tabs">
      <button class="owner-tab-btn active" data-owner-tab="products">Товары</button>
      <button class="owner-tab-btn" data-owner-tab="add">Добавить товар</button>
      <button class="owner-tab-btn" data-owner-tab="clients">База клиентов</button>
      <button class="owner-tab-btn" data-owner-tab="about">О компании</button>
    </div>
    <div id="owner-products-tab">
      <div class="owner-grid" id="owner-products-grid"></div>
    </div>
    <div id="owner-add-tab" style="display:none; max-width:500px;">
      <div class="form-group"><label>Название</label><input id="owner-new-name"></div>
      <div class="form-group"><label>Категория</label><select id="owner-new-category"><option value="ashtray">Пепельница</option><option value="plate">Тарелка</option><option value="magnet">Магнит</option></select></div>
      <div class="form-group"><label>Цена</label><input type="number" id="owner-new-price"></div>
      <div class="form-group"><label>Описание</label><input id="owner-new-desc"></div>
      <button class="submit-btn" id="owner-add-btn">Добавить товар</button>
    </div>
    <div id="owner-clients-tab" style="display:none;">
      <div class="client-table" id="clients-container"></div>
    </div>
    <div id="owner-about-tab" style="display:none; max-width:600px;">
      <div class="form-group"><label>Заголовок (HTML можно)</label><input id="about-edit-title" value="Сувениры с душой <span class='highlight'>с 2004 года</span>"></div>
      <div class="form-group"><label>Описание</label><input id="about-edit-desc" value="<strong>КубаньСувенир</strong> — производство в Краснодарском крае."></div>
      <div class="form-group"><label>Фото блока</label><input type="file" accept="image/*" id="about-photo-input"></div>
      <button class="submit-btn" id="save-about-btn">Сохранить изменения</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="panel" id="cart-panel">
  <div class="panel-header"><span>Корзина</span><button class="close-panel" id="close-cart">&times;</button></div>
  <div id="cart-items" style="flex:1;"><div style="color:var(--text-light);text-align:center;margin-top:3rem;">Пусто</div></div>
  <div class="total"><span>Итого</span><span id="cart-total">0 ₽</span></div>
  <button class="submit-btn" id="checkout-btn">Оформить</button>
</div>
<div class="panel" id="auth-panel">
  <div class="panel-header"><span>Вход / Регистрация</span><button class="close-panel" id="close-auth">&times;</button></div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-login">Вход</button>
    <button class="tab-btn" id="tab-register">Регистрация</button>
  </div>
  <div id="login-form">
    <div class="form-group"><label>Почта</label><input id="login-email"></div>
    <div class="form-group"><label>Пароль</label><input type="password" id="login-password"></div>
    <button class="submit-btn" id="login-submit">Войти</button>
  </div>
  <div id="register-form" style="display:none;">
    <div class="form-group"><label>ФИО</label><input id="reg-name"></div>
    <div class="form-group"><label>Телефон</label><input id="reg-phone"></div>
    <div class="form-group"><label>Почта</label><input id="reg-email"></div>
    <div class="form-group"><label>Пароль</label><input type="password" id="reg-password"></div>
    <button class="submit-btn" id="register-submit">Зарегистрироваться</button>
  </div>
</div>

<script>
  (function() {
    let users = JSON.parse(localStorage.getItem('kuban_users')) || [{ email: '123', password: '123', name: 'Владелец', phone: '', role: 'owner' }];
    let currentUser = JSON.parse(localStorage.getItem('kuban_currentUser')) || null;
    let products = JSON.parse(localStorage.getItem('kuban_products')) || [
      { id: 1, name: "Пепельница «Якорь»", category: "ashtray", price: 480, opt: "от 380 ₽", desc: "Массив дуба", photo: "" },
      { id: 2, name: "Пепельница «Штурвал»", category: "ashtray", price: 520, opt: "от 410 ₽", desc: "Бук, 14 см", photo: "" },
      { id: 3, name: "Тарелка «Кубань»", category: "plate", price: 650, opt: "от 520 ₽", desc: "Роспись", photo: "" },
      { id: 4, name: "Тарелка «Черноморье»", category: "plate", price: 690, opt: "от 550 ₽", desc: "Гравировка", photo: "" },
      { id: 5, name: "Тарелка «Закат»", category: "plate", price: 720, opt: "от 580 ₽", desc: "Керамика", photo: "" },
      { id: 6, name: "Тарелка «Горы»", category: "plate", price: 720, opt: "от 580 ₽", desc: "Бирюза", photo: "" },
      { id: 7, name: "Магнит «Штурвал»", category: "magnet", price: 180, opt: "от 120 ₽", desc: "Дерево", photo: "" },
      { id: 8, name: "Магнит «Овал»", category: "magnet", price: 160, opt: "от 110 ₽", desc: "Акрил", photo: "" },
      { id: 9, name: "Магнит «Краснодар»", category: "magnet", price: 150, opt: "от 100 ₽", desc: "Винил", photo: "" },
      { id: 10, name: "Магнит «Дельфин»", category: "magnet", price: 150, opt: "от 100 ₽", desc: "Винил", photo: "" }
    ];
    let aboutData = JSON.parse(localStorage.getItem('kuban_about')) || {
      title: "Сувениры с душой <span class='highlight'>с 2004 года</span>",
      desc: "<strong>КубаньСувенир</strong> — производство в Краснодарском крае.",
      photo: ""
    };
    let cart = JSON.parse(localStorage.getItem('kuban_cart')) || [];

    function save() {
      localStorage.setItem('kuban_users', JSON.stringify(users));
      localStorage.setItem('kuban_currentUser', JSON.stringify(currentUser));
      localStorage.setItem('kuban_products', JSON.stringify(products));
      localStorage.setItem('kuban_about', JSON.stringify(aboutData));
      localStorage.setItem('kuban_cart', JSON.stringify(cart));
    }

    const mainSite = document.getElementById('main-site');
    const ownerPage = document.getElementById('owner-page');
    const container = document.getElementById('products-container');
    const cartPanel = document.getElementById('cart-panel');
    const authPanel = document.getElementById('auth-panel');
    const overlay = document.getElementById('overlay');
    const userDisplay = document.getElementById('user-display');
    const userMenuBtn = document.getElementById('user-menu-btn');
    const logoutBtn = document.getElementById('logout-btn');

    function applyAboutData() {
      document.getElementById('about-title').innerHTML = aboutData.title;
      document.getElementById('about-desc').innerHTML = aboutData.desc;
      const img = document.getElementById('about-photo');
      const emoji = document.getElementById('about-emoji');
      if (aboutData.photo) {
        img.src = aboutData.photo;
        img.style.display = 'block';
        emoji.style.display = 'none';
      } else {
        img.style.display = 'none';
        emoji.style.display = 'block';
      }
    }

    function updateUI() {
      if (currentUser) {
        userDisplay.textContent = currentUser.name;
        userMenuBtn.innerHTML = currentUser.role === 'owner' ? '<i class="fas fa-crown"></i> ' + currentUser.name : '<i class="fas fa-user"></i> ' + currentUser.name;
        logoutBtn.classList.add('visible');
      } else {
        userDisplay.textContent = 'Войти';
        userMenuBtn.innerHTML = '<i class="fas fa-user"></i> Войти';
        logoutBtn.classList.remove('visible');
      }
      document.getElementById('cart-count').textContent = cart.length;
    }

    function renderProducts(cat = 'all') {
      const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
      container.innerHTML = filtered.map(p => `
        <div class="product-card">
          <div class="product-img">${p.photo ? `<img src="${p.photo}" alt="${p.name}">` : `<span>📦</span>`}</div>
          <div class="product-title">${p.name}</div><div class="product-meta">${p.desc}</div>
          <div class="price-row"><div><span class="price">${p.price} ₽</span><span class="price-opt">${p.opt}</span></div>
          <button class="add-to-cart" data-id="${p.id}"><i class="fas fa-cart-plus"></i></button></div>
        </div>`).join('');
      document.querySelectorAll('.add-to-cart').forEach(b => b.addEventListener('click', () => {
        if (!currentUser) { alert('Сначала войдите!'); openPanel(authPanel); return; }
        const p = products.find(x => x.id === parseInt(b.dataset.id));
        if (p) { cart.push({...p}); updateCart(); save(); }
      }));
    }

    function updateCart() {
      const div = document.getElementById('cart-items');
      if (cart.length === 0) div.innerHTML = '<div style="color:var(--text-light);text-align:center;margin-top:3rem;">Пусто</div>';
      else div.innerHTML = cart.map((item, i) => `<div class="cart-item"><div><strong>${item.name}</strong><br><small>${item.price} ₽</small></div><button class="remove-item" data-index="${i}"><i class="fas fa-trash"></i></button></div>`).join('');
      document.querySelectorAll('.remove-item').forEach(b => b.addEventListener('click', () => { cart.splice(parseInt(b.dataset.index), 1); updateCart(); save(); }));
      document.getElementById('cart-total').textContent = cart.reduce((s, i) => s + i.price, 0).toLocaleString() + ' ₽';
      document.getElementById('cart-count').textContent = cart.length;
    }

    function openPanel(p) { document.querySelectorAll('.panel').forEach(x => x.classList.remove('open')); p.classList.add('open'); overlay.classList.add('show'); }
    function closeAll() { document.querySelectorAll('.panel').forEach(x => x.classList.remove('open')); overlay.classList.remove('show'); }
    function logout() { currentUser = null; save(); updateUI(); closeAll(); }

    document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
      this.classList.add('active'); renderProducts(this.dataset.category);
    }));

    document.getElementById('cart-toggle').addEventListener('click', () => openPanel(cartPanel));
    document.getElementById('close-cart').addEventListener('click', closeAll);
    document.getElementById('checkout-btn').addEventListener('click', () => {
      if (!cart.length) alert('Пусто'); else if (!currentUser) alert('Войдите');
      else { alert('Заказ оформлен!'); cart = []; updateCart(); save(); closeAll(); }
    });

    userMenuBtn.addEventListener('click', () => {
      if (currentUser && currentUser.role === 'owner') { mainSite.style.display = 'none'; ownerPage.classList.add('active'); renderOwnerProducts(); }
      else if (!currentUser) openPanel(authPanel);
    });
    logoutBtn.addEventListener('click', logout);
    document.getElementById('back-to-site').addEventListener('click', () => { ownerPage.classList.remove('active'); mainSite.style.display = 'block'; renderProducts(); applyAboutData(); });

    document.getElementById('close-auth').addEventListener('click', closeAll);
    overlay.addEventListener('click', closeAll);

    document.getElementById('tab-login').addEventListener('click', () => {
      document.getElementById('tab-login').classList.add('active'); document.getElementById('tab-register').classList.remove('active');
      document.getElementById('login-form').style.display = 'block'; document.getElementById('register-form').style.display = 'none';
    });
    document.getElementById('tab-register').addEventListener('click', () => {
      document.getElementById('tab-register').classList.add('active'); document.getElementById('tab-login').classList.remove('active');
      document.getElementById('login-form').style.display = 'none'; document.getElementById('register-form').style.display = 'block';
    });
    document.getElementById('login-submit').addEventListener('click', () => {
      const e = document.getElementById('login-email').value.trim(), p = document.getElementById('login-password').value.trim();
      const u = users.find(x => x.email === e && x.password === p);
      if (u) { currentUser = u; save(); updateUI(); closeAll(); }
      else alert('Неверно');
    });
    document.getElementById('register-submit').addEventListener('click', () => {
      const n = document.getElementById('reg-name').value.trim(), ph = document.getElementById('reg-phone').value.trim();
      const e = document.getElementById('reg-email').value.trim(), p = document.getElementById('reg-password').value.trim();
      if (!n || !e || !p) { alert('Заполните ФИО, почту, пароль'); return; }
      if (users.find(x => x.email === e)) { alert('Почта занята'); return; }
      users.push({ email: e, password: p, name: n, phone: ph, role: 'user' });
      currentUser = users[users.length-1]; save(); updateUI(); closeAll();
    });

    function renderOwnerProducts() {
      const grid = document.getElementById('owner-products-grid');
      grid.innerHTML = products.map(p => `
        <div class="owner-card">
          ${p.photo ? `<img src="${p.photo}" alt="${p.name}">` : '<div style="height:160px;background:#f9fafb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:3rem;">📦</div>'}
          <input value="${p.name}" data-id="${p.id}" data-field="name" style="width:100%;margin:0.3rem 0;">
          <input value="${p.desc}" data-id="${p.id}" data-field="desc" style="width:100%;margin:0.3rem 0;">
          <input value="${p.price}" data-id="${p.id}" data-field="price" type="number" style="width:100%;margin:0.3rem 0;">
          <div class="photo-upload"><label>Фото:</label><input type="file" accept="image/*" data-id="${p.id}" class="photo-input"></div>
          <button class="delete-btn" data-id="${p.id}">Удалить</button>
        </div>`).join('');
      grid.querySelectorAll('input:not([type=file])').forEach(inp => inp.addEventListener('change', () => {
        const pr = products.find(x => x.id === parseInt(inp.dataset.id));
        if (pr) { pr[inp.dataset.field] = inp.dataset.field === 'price' ? (parseInt(inp.value)||0) : inp.value; save(); }
      }));
      grid.querySelectorAll('.photo-input').forEach(inp => inp.addEventListener('change', function() {
        const file = this.files[0]; if (file) { const reader = new FileReader(); reader.onload = e => { const pr = products.find(x => x.id === parseInt(this.dataset.id)); if (pr) { pr.photo = e.target.result; save(); renderOwnerProducts(); } }; reader.readAsDataURL(file); }
      }));
      grid.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', () => { products = products.filter(x => x.id !== parseInt(b.dataset.id)); save(); renderOwnerProducts(); }));
    }

    function renderClients() {
      const div = document.getElementById('clients-container');
      const clients = users.filter(u => u.role !== 'owner');
      div.innerHTML = clients.length ? '<div class="client-row" style="font-weight:600;"><span>Имя</span><span>Email</span><span>Телефон</span></div>' + clients.map(c => `<div class="client-row"><span>${c.name}</span><span>${c.email}</span><span>${c.phone || '-'}</span></div>`).join('') : '<p>Нет клиентов</p>';
    }

    document.querySelectorAll('.owner-tab-btn').forEach(b => b.addEventListener('click', function() {
      document.querySelectorAll('.owner-tab-btn').forEach(x => x.classList.remove('active'));
      this.classList.add('active');
      ['products','add','clients','about'].forEach(t => document.getElementById('owner-'+t+'-tab').style.display = 'none');
      document.getElementById('owner-'+this.dataset.ownerTab+'-tab').style.display = 'block';
      if (this.dataset.ownerTab === 'products') renderOwnerProducts();
      if (this.dataset.ownerTab === 'clients') renderClients();
      if (this.dataset.ownerTab === 'about') {
        document.getElementById('about-edit-title').value = aboutData.title;
        document.getElementById('about-edit-desc').value = aboutData.desc;
      }
    }));

    document.getElementById('owner-add-btn').addEventListener('click', () => {
      const name = document.getElementById('owner-new-name').value.trim();
      if (!name) { alert('Введите название'); return; }
      products.push({ id: Math.max(0,...products.map(p=>p.id))+1, name, category: document.getElementById('owner-new-category').value, price: parseInt(document.getElementById('owner-new-price').value)||0, opt: 'от '+Math.round((parseInt(document.getElementById('owner-new-price').value)||0)*0.8)+' ₽', desc: document.getElementById('owner-new-desc').value.trim(), photo: '' });
      save(); renderOwnerProducts();
    });

    document.getElementById('save-about-btn').addEventListener('click', () => {
      aboutData.title = document.getElementById('about-edit-title').value;
      aboutData.desc = document.getElementById('about-edit-desc').value;
      save(); applyAboutData(); alert('Сохранено!');
    });

    document.getElementById('about-photo-input').addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => { aboutData.photo = e.target.result; save(); applyAboutData(); };
        reader.readAsDataURL(file);
      }
    });

    renderProducts(); updateCart(); updateUI(); applyAboutData();
  })();
</script>
</body>
</html>
