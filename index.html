<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КубаньСувенир - Сувениры ручной работы</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Шапка -->
    <header>
        <div class="logo">
            <h1>КубаньСувенир</h1>
            <p>Сувениры с 2004 года</p>
        </div>
        <nav>
            <a href="index.html">Каталог</a>
            <a href="#" id="cartLink">Корзина (<span id="cartCount">0</span>)</a>
            <a href="admin.html">Админ-панель</a>
        </nav>
    </header>

    <!-- Основной контент -->
    <main>
        <!-- Фильтры -->
        <div class="filters">
            <button onclick="filterProducts('all')">Все</button>
            <button onclick="filterProducts('Пепельницы')">Пепельницы</button>
            <button onclick="filterProducts('Тарелки')">Тарелки</button>
            <button onclick="filterProducts('Магниты')">Магниты</button>
        </div>

        <!-- Каталог товаров -->
        <div id="productsGrid" class="products-grid">
            <p>Загрузка товаров...</p>
        </div>

        <!-- Корзина (скрыта по умолчанию) -->
        <div id="cartModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>Корзина</h2>
                <div id="cartItems"></div>
                <div class="cart-total">
                    <strong>Итого: <span id="cartTotal">0</span> руб.</strong>
                </div>
                
                <!-- Форма оформления заказа -->
                <form id="orderForm">
                    <input type="text" id="customerName" placeholder="Ваше имя" required>
                    <input type="tel" id="customerPhone" placeholder="Телефон" required>
                    <input type="email" id="customerEmail" placeholder="Email">
                    <button type="submit">Оформить заказ</button>
                </form>
                
                <button onclick="toggleCart()">Закрыть</button>
            </div>
        </div>
    </main>

    <!-- Инициализация Firebase -->
    <script type="module" src="firebase-init.js"></script>
    
    <!-- Основной скрипт магазина -->
    <script type="module">
        // Ждем инициализации Firebase
        setTimeout(() => {
            if (!window.db) {
                console.error('Firebase не инициализирован');
                return;
            }
            
            // Глобальные переменные
            let allProducts = [];
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            // Загрузка товаров из Firestore
            window.loadProductsFromFirebase = async function() {
                try {
                    const { getDocs, collection } = window.firebaseHelpers;
                    const snapshot = await getDocs(collection(window.db, 'products'));
                    allProducts = [];
                    snapshot.forEach(doc => {
                        allProducts.push({ 
                            id: doc.id, 
                            ...doc.data() 
                        });
                    });
                    console.log('Загружено товаров:', allProducts.length);
                    displayProducts(allProducts);
                } catch (error) {
                    console.error('Ошибка загрузки товаров:', error);
                    document.getElementById('productsGrid').innerHTML = 
                        '<p>Ошибка загрузки товаров. Проверьте подключение.</p>';
                }
            };
            
            // Отображение товаров
            function displayProducts(products) {
                const grid = document.getElementById('productsGrid');
                
                if (products.length === 0) {
                    grid.innerHTML = '<p>Товаров пока нет. Добавьте их через админ-панель.</p>';
                    return;
                }
                
                grid.innerHTML = products.map(product => `
                    <div class="product-card">
                        <img src="${product.image || 'https://via.placeholder.com/300x200?text=Нет+фото'}" 
                             alt="${product.name}"
                             onerror="this.src='https://via.placeholder.com/300x200?text=Нет+фото'">
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <p class="category">${product.category}</p>
                            <p class="description">${product.description || ''}</p>
                            <p class="price">${product.price} руб.</p>
                            <button onclick="addToCart('${product.id}')">
                                В корзину
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            
            // Фильтрация товаров
            window.filterProducts = function(category) {
                if (category === 'all') {
                    displayProducts(allProducts);
                } else {
                    const filtered = allProducts.filter(p => p.category === category);
                    displayProducts(filtered);
                }
            };
            
            // Работа с корзиной
            window.addToCart = function(productId) {
                const product = allProducts.find(p => p.id === productId);
                if (!product) return;
                
                const existingItem = cart.find(item => item.id === productId);
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    cart.push({
                        id: productId,
                        name: product.name,
                        price: product.price,
                        quantity: 1
                    });
                }
                
                saveCart();
                alert(`${product.name} добавлен в корзину`);
            };
            
            function saveCart() {
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartDisplay();
            }
            
            function updateCartDisplay() {
                const count = cart.reduce((sum, item) => sum + item.quantity, 0);
                document.getElementById('cartCount').textContent = count;
            }
            
            window.toggleCart = function() {
                const modal = document.getElementById('cartModal');
                const isVisible = modal.style.display === 'block';
                modal.style.display = isVisible ? 'none' : 'block';
                
                if (!isVisible) {
                    displayCartItems();
                }
            };
            
            function displayCartItems() {
                const container = document.getElementById('cartItems');
                const totalElement = document.getElementById('cartTotal');
                
                if (cart.length === 0) {
                    container.innerHTML = '<p>Корзина пуста</p>';
                    totalElement.textContent = '0';
                    return;
                }
                
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <span>${item.name} × ${item.quantity}</span>
                        <span>${item.price * item.quantity} руб.</span>
                        <button onclick="removeFromCart('${item.id}')">Удалить</button>
                    </div>
                `).join('');
                
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                totalElement.textContent = total;
            }
            
            window.removeFromCart = function(productId) {
                cart = cart.filter(item => item.id !== productId);
                saveCart();
                displayCartItems();
            };
            
            // Оформление заказа
            document.getElementById('orderForm')?.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (cart.length === 0) {
                    alert('Корзина пуста!');
                    return;
                }
                
                const orderData = {
                    items: cart,
                    customerName: document.getElementById('customerName').value,
                    customerPhone: document.getElementById('customerPhone').value,
                    customerEmail: document.getElementById('customerEmail').value,
                    total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                    status: 'new',
                    createdAt: new Date().toISOString()
                };
                
                try {
                    const { addDoc, collection } = window.firebaseHelpers;
                    await addDoc(collection(window.db, 'orders'), orderData);
                    
                    alert('Заказ успешно оформлен! Мы свяжемся с вами.');
                    
                    // Очищаем корзину
                    cart = [];
                    saveCart();
                    toggleCart();
                    
                    // Сбрасываем форму
                    this.reset();
                } catch (error) {
                    console.error('Ошибка оформления заказа:', error);
                    alert('Ошибка при оформлении заказа. Попробуйте позже.');
                }
            });
            
            // Открытие корзины по клику
            document.getElementById('cartLink')?.addEventListener('click', (e) => {
                e.preventDefault();
                toggleCart();
            });
            
            // Загружаем товары при старте
            loadProductsFromFirebase();
            updateCartDisplay();
            
        }, 1000);
    </script>
</body>
</html>
