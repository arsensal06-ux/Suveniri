<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - КубаньСувенир</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>КубаньСувенир</h1>
            <p>Панель администратора</p>
        </div>
        <nav>
            <a href="index.html">Вернуться на сайт</a>
            <a href="#" id="logoutBtn" style="display:none;">Выйти</a>
        </nav>
    </header>

    <main>
        <div id="loginSection">
            <h2>Вход в админ-панель</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
        </div>

        <div id="adminSection" style="display: none;">
            <div class="admin-grid">
                <div class="admin-form">
                    <h2>Добавить товар</h2>
                    <form id="addProductForm">
                        <label>Название:</label>
                        <input type="text" id="productName" required>
                        
                        <label>Категория:</label>
                        <select id="productCategory" required>
                            <option value="Пепельницы">Пепельницы</option>
                            <option value="Тарелки">Тарелки</option>
                            <option value="Магниты">Магниты</option>
                        </select>
                        
                        <label>Цена (руб.):</label>
                        <input type="number" id="productPrice" required>
                        
                        <label>Описание:</label>
                        <textarea id="productDescription"></textarea>
                        
                        <label>URL изображения:</label>
                        <input type="text" id="productImage" placeholder="https://...">
                        
                        <button type="submit">Добавить товар</button>
                    </form>
                </div>

                <div class="admin-products">
                    <h2>Управление товарами</h2>
                    <div id="adminProductsList">
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
            
            <div class="admin-orders" style="margin-top: 40px;">
                <h2>Заказы</h2>
                <div id="ordersList">
                    <p>Загрузка заказов...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="firebase-init.js"></script>
    
    <script type="module">
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        setTimeout(() => {
            const auth = getAuth();
            const db = getFirestore();
            
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminSection').style.display = 'block';
                    document.getElementById('logoutBtn').style.display = 'inline';
                    loadAdminProducts();
                    loadOrders();
                } else {
                    document.getElementById('loginSection').style.display = 'block';
                    document.getElementById('adminSection').style.display = 'none';
                    document.getElementById('logoutBtn').style.display = 'none';
                }
            });
            
            document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    console.log('Вход выполнен!');
                } catch (error) {
                    alert('Ошибка входа: ' + error.message);
                }
            });
            
            document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
                e.preventDefault();
                await signOut(auth);
            });
            
            document.getElementById('addProductForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const product = {
                    name: document.getElementById('productName').value,
                    category: document.getElementById('productCategory').value,
                    price: Number(document.getElementById('productPrice').value),
                    description: document.getElementById('productDescription').value,
                    image: document.getElementById('productImage').value || 'https://via.placeholder.com/300x200?text=Нет+фото',
                    createdAt: new Date().toISOString()
                };
                try {
                    await addDoc(collection(db, 'products'), product);
                    alert('Товар добавлен!');
                    document.getElementById('addProductForm').reset();
                    loadAdminProducts();
                } catch (error) {
                    alert('Ошибка: ' + error.message);
                }
            });
            
            async function loadAdminProducts() {
                const container = document.getElementById('adminProductsList');
                try {
                    const snapshot = await getDocs(collection(db, 'products'));
                    const products = [];
                    snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
                    
                    if (products.length === 0) {
                        container.innerHTML = '<p>Нет товаров</p>';
                        return;
                    }
                    
                    container.innerHTML = products.map(p => `
                        <div class="admin-product-item">
                            <div>
                                <strong>${p.name}</strong> - ${p.category} - ${p.price} руб.
                            </div>
                            <div>
                                <button onclick="deleteProduct('${p.id}')">Удалить</button>
                            </div>
                        </div>
                    `).join('');
                } catch (error) {
                    container.innerHTML = '<p>Ошибка загрузки</p>';
                }
            }
            
            window.deleteProduct = async function(productId) {
                if (!confirm('Удалить товар?')) return;
                try {
                    await deleteDoc(doc(db, 'products', productId));
                    alert('Товар удален');
                    loadAdminProducts();
                } catch (error) {
                    alert('Ошибка удаления');
                }
            };
            
            async function loadOrders() {
                const container = document.getElementById('ordersList');
                try {
                    const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
                    const snapshot = await getDocs(q);
                    const orders = [];
                    snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                    
                    if (orders.length === 0) {
                        container.innerHTML = '<p>Заказов пока нет</p>';
                        return;
                    }
                    
                    container.innerHTML = orders.map(order => `
                        <div class="order-card">
                            <div class="order-header">
                                <strong>Заказ от ${new Date(order.createdAt).toLocaleString()}</strong>
                                <span class="status">${order.status}</span>
                            </div>
                            <p><strong>Клиент:</strong> ${order.customerName}</p>
                            <p><strong>Телефон:</strong> ${order.customerPhone}</p>
                            <p><strong>Сумма:</strong> ${order.total} руб.</p>
                        </div>
                    `).join('');
                } catch (error) {
                    container.innerHTML = '<p>Ошибка загрузки заказов</p>';
                }
            }
        }, 1000);
    </script>
</body>
</html>
